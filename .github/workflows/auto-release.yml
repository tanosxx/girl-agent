name: Auto-release (hourly)

on:
  schedule:
    - cron: "0 * * * *" # каждый час
  workflow_dispatch: # ручной запуск

permissions:
  contents: write
  actions: write # для workflow_dispatch других workflows

jobs:
  release:
    name: Check for changes and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # полная история для тегов

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for new commits since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags found"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No new commits since $LAST_TAG"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "$COMMIT_COUNT new commit(s) since $LAST_TAG"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git log "${LAST_TAG}..HEAD" --pretty=format:'- %s' > /tmp/commits.txt
          fi

      - name: Bump patch version
        if: steps.check.outputs.has_changes == 'true'
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Update CHANGELOG.md
        if: steps.check.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)

          {
            echo "# Changelog"
            echo ""
            echo "## ${VERSION}"
            echo ""
            echo "Дата: ${DATE}"
            echo ""
            cat /tmp/commits.txt
            echo ""
            # старый changelog без первой строки "# Changelog"
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit, tag, and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin master --tags

      - name: Trigger docker publish
        if: steps.check.outputs.has_changes == 'true'
        run: gh workflow run "Publish docker image" --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger npm publish
        if: steps.check.outputs.has_changes == 'true'
        run: gh workflow run "Publish to npm" --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
